<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Workflow Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #111118;
            border-bottom: 1px solid #2a2a4a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            color: #7c6af7;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left — chat */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a4a;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #1e1e3a;
            border: 1px solid #3a3a6a;
            align-self: flex-end;
            color: #a0a0ff;
        }

        .message.agent {
            background: #0f1a0f;
            border: 1px solid #1a4a1a;
            align-self: flex-start;
            color: #a0ffa0;
        }

        .message .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            opacity: 0.6;
        }

        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: #111118;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #7c6af7;
        }

        button {
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #6a58e0; }
        button:disabled { background: #3a3a4a; cursor: not-allowed; }

        /* Right — agent activity */
        .activity-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
        }

        .activity-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7c6af7;
        }

        .events {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .event {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }

        .event.thinking {
            background: #1a1a2e;
            border-left: 3px solid #7c6af7;
            color: #a0a0ff;
        }

        .event.acting {
            background: #1a2a1a;
            border-left: 3px solid #22c55e;
            color: #a0ffa0;
        }

        .event.tool {
            background: #2a1a0a;
            border-left: 3px solid #f59e0b;
            color: #fcd34d;
        }

        .event.user {
            background: #1a1a2e;
            border-left: 3px solid #60a5fa;
            color: #93c5fd;
        }

        .event.idle {
            background: #1a1a1a;
            border-left: 3px solid #6b7280;
            color: #9ca3af;
        }

        .event-icon { font-size: 16px; flex-shrink: 0; }

        .thinking-indicator {
            display: none;
            padding: 10px 14px;
            background: #1a1a2e;
            border-left: 3px solid #7c6af7;
            border-radius: 6px;
            color: #a0a0ff;
            font-size: 12px;
            align-items: center;
            gap: 10px;
        }

        .thinking-indicator.visible {
            display: flex;
        }

        .dots span {
            animation: blink 1.2s infinite;
            opacity: 0;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3a3a5a;
            font-size: 13px;
            text-align: center;
            padding: 24px;
        }
    </style>
</head>
<body>

<header>
    <div class="status-dot"></div>
    <h1>AI Agent Workflow Manager</h1>
</header>

<div class="main">
    <!-- Chat Panel -->
    <div class="chat-panel">
        <div class="messages" id="messages">
            <div class="message agent">
                <div class="label">Agent</div>
                Hello! I'm your AI agent. I can calculate math, read files, crawl websites, and send emails. What do you need?
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Activity Panel -->
    <div class="activity-panel">
        <div class="activity-header">⚡ Agent Activity</div>
        <div class="events" id="events">
            <div class="empty-state" id="emptyState">
                Agent activity will appear here when you send a message
            </div>
        </div>
        <div class="thinking-indicator" id="thinkingIndicator">
            <span class="event-icon">🧠</span>
            <span>Thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    const events = document.getElementById('events');
    const thinkingIndicator = document.getElementById('thinkingIndicator');
    const emptyState = document.getElementById('emptyState');

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage();
    });

    function getEventStyle(event) {
        if (event.includes('THINKING')) return ['thinking', '🧠'];
        if (event.includes('ACTING'))   return ['acting',   '⚡'];
        if (event.includes('tool') || event.includes('Tool') || event.includes('Using')) return ['tool', '🔧'];
        if (event.includes('User said')) return ['user', '💬'];
        if (event.includes('IDLE'))     return ['idle',    '💤'];
        if (event.includes('result') || event.includes('Result')) return ['acting', '✅'];
        return ['idle', 'ℹ️'];
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        sendBtn.disabled = true;

        // show user message
        addMessage('user', text);

        // clear events, show thinking
        events.innerHTML = '';
        thinkingIndicator.classList.add('visible');

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                body: text
            });

            const data = await res.json();

            // hide thinking
            thinkingIndicator.classList.remove('visible');

            // show events
            data.events.forEach((event, i) => {
                setTimeout(() => addEvent(event), i * 150);
            });

            // show agent response
            setTimeout(() => {
                addMessage('agent', data.response);
            }, data.events.length * 150 + 200);

        } catch (err) {
            thinkingIndicator.classList.remove('visible');
            addEvent('Error: ' + err.message);
            addMessage('agent', 'Sorry, something went wrong.');
        }

        sendBtn.disabled = false;
        input.focus();
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Agent'}</div>${text}`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function addEvent(event) {
        const [cls, icon] = getEventStyle(event);
        const div = document.createElement('div');
        div.className = `event ${cls}`;
        div.innerHTML = `<span class="event-icon">${icon}</span><span>${event}</span>`;
        events.appendChild(div);
        events.scrollTop = events.scrollHeight;
    }
</script>
</body>
</html>
